name: Deploy to Production

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'

          echo "🚀 Deploy boshlandi"

          cd /var/www/prohome/frontend/sales

          echo "📥 Git yangilanishlar olinmoqda..."
          git fetch origin
          git reset --hard origin/main

          cd /var/www/prohome/docker

          echo "🐳 Docker image build qilinmoqda..."
          docker compose build

          echo "🔄 Container yangilanmoqda..."
          docker compose up -d

          echo "📊 Container holati: "
          docker ps

          echo "✅ Deploy muvaffaqiyatli tugadi."

          EOF