name: Release yaratish

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Release versiya yaratish
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ github.run_number }}
          name: Yangi versiya
          body: |
            Ushbu versiya test branchidan production ga o'tkazildi.

            O'zgarishlar PR lar orqali qo'shilgan.